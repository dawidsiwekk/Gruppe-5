<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/the-card.css">
    <link rel="stylesheet" href="css/akvarie.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fredoka:wght@300..700&family=Julius+Sans+One&display=swap" rel="stylesheet">    

</head>
<body>
<div class="aquarium">
  <div class="ray" style="left:12%; animation-delay:0s;"></div>
  <div class="ray" style="left:30%; animation-delay:-1.5s; width:55px;"></div>
  <div class="ray" style="left:52%; animation-delay:-0.8s; width:70px;"></div>
  <div class="ray" style="left:74%; animation-delay:-2.2s;"></div>
  <div class="ray" style="left:90%; animation-delay:-1s; width:50px;"></div>
  <div id="bg-layer"></div>
  <div id="bubbles-layer"></div>
  <div id="plants-layer"></div>
  <div class="sand"></div>
  <div class="vignette"></div>
  <div id="fg-layer"></div>
</div>

<header>
    <h1 id="welcome-header">HVOR BOR FISKEN?</h1>
</header>

<main>
    <div class="the-card-box">

        <img src="img/the-card.png" alt="verdens-kort" id="the-card-1">
        <div class="map-area" id="area-1"></div>
        <div class="map-area" id="area-2"></div>   
        <div class="map-area" id="area-3"></div> 
        <div class="map-area" id="area-4"></div> 
         
    </div>

    <div class="fish-box">

        <div class="fish-box-1">
            <p>Pincetfisk</p>
            <img src="img/fish-1-vector.svg" alt="fish-1-vector" id="fish-1-vector">
        </div>

        <div class="fish-box-2">
            <p>Klovnfisk</p>
            <img src="img/fish-2-vector.svg" alt="fish-2-vector" id="fish-2-vector">
        </div>

        <div class="fish-box-3">
            <p>Søhest</p>
            <img src="img/seahorse.gif" alt="fish-3-vector" id="fish-3-vector">
        </div>

        <div class="fish-box-4">
            <p>Guldfisk</p>
            <img src="img/fish-4-vector.svg" alt="fish-4-vector" id="fish-4-vector">
        </div>
            
    </div>
</main>

<a href="akvarie.html" id="go-back"><img src="img/go-back.png" alt="go back"></a>

<script src="js/aquarium-bg.js"></script>
<script src="js/the-card.js"></script>
</body>
</html>
